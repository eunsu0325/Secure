# COCONUT Configuration

Dataset:
  # 등록 대상 사용자 파일 — 내부에서 90% train/NCM + 10% probe로 자동 분리됨
  enroll_file: /content/drive/MyDrive/데이터셋/BJTU_PalmV2(ROI)/train_left.txt

  # 독립적인 per-user 평가용 probe 파일 — BWT/forgetting 측정 전용 (enroll_file과 다른 파일)
  eval_probe_file: /content/drive/MyDrive/데이터셋/BJTU_PalmV2(ROI)/test_left.txt

  height: 128
  width: 128
  channels: 1
  augmentation: true

  # 크로스도메인 FPIR_xdom 평가 전용 파일 — 학습에 사용하지 않음 (예: IITD 데이터셋)
  xdomain_file: /content/drive/MyDrive/데이터셋/train_IITD.txt
  num_xdomain_classes: 148

  # τ calibration용 비등록 사용자 데이터 — enroll_file 미등록 ID 앞 50%로 구성 권장
  unknown_dev_file: /content/drive/MyDrive/데이터셋/BJTU_PalmV2(ROI)/unknown_dev_file.txt
  # FPIR_in 최종 평가용 비등록 사용자 데이터 — enroll_file 미등록 ID 뒤 50%로 구성 권장
  unknown_test_file: /content/drive/MyDrive/데이터셋/BJTU_PalmV2(ROI)/unknown_test_file.txt
Model:
  architecture: ccnet
  competition_weight: 0.8
  use_pretrained: true
  pretrained_path: /content/drive/MyDrive/tongji.pth
  # Projection head settings
  projection_dim: 512  # 🍑 6144D -> 512D projection
  use_projection: false
  use_projection_for_ncm: false  # 🍑 NCM도 512D projection 사용할지 (false=6144D, true=512D)

Training:
  experience_batch_size: 16
  memory_batch_size: 200  # 112→200 (clipping 적용으로 초반 과적합 방지됨)
  num_experiences: 100
  memory_size: 1000
  min_samples_per_class: 9

  # Herding buffer settings (iCaRL-inspired)
  use_herding: false  # Enable herding buffer instead of random sampling
  max_samples_per_class: 20  # Maximum samples per class for herding
  herding_batch_size: 32  # Batch size for feature extraction
  drift_threshold: 0.5  # Threshold for feature drift detection

  epochs_per_experience: 5
  iterations_per_epoch: 10
  num_workers: 8
  learning_rate: 0.0001
  projection_learning_rate: 0.0005  # 5x backbone LR
  scheduler_step_size: 50
  scheduler_gamma: 0.8
  temperature: 0.07  # SupConLoss temperature
  test_interval: 1  # Evaluation and calibration frequency
  checkpoint_path: /content/drive/MyDrive/coconut_update1
  results_path: /content/drive/MyDrive/coconut_update1
  gpu_ids: "0"
  ncm_momentum: 1.0
  seed: 42
  curriculum_ramp_users: 12

  # Logging
  verbose: false  # true: 전체 출력, false: compact 출력 (논문 지표 중심)

  # ProxyAnchorLoss settings
  use_proxy_anchor: true
  proxy_margin: 0.2        # Proxy Anchor margin delta
  proxy_alpha: 16          # Proxy Anchor scaling alpha
  proxy_lr_ratio: 100        # Proxy learning rate multiplier (10x backbone)
  proxy_lambda: 0.7        # Fixed weight (0.3 = 30% ProxyAnchor, 70% SupCon)

  # IDL+RTM Loss (Open-set representation 최적화)
  use_idl_rtm: true
  idl_alpha_det: 1.0          # Detection loss 내부 가중치
  idl_beta_id: 1.0            # Identification loss 내부 가중치
  idl_gamma_rtm: 0.5          # RTM loss 내부 가중치
  idl_rtm_lambda: 0.3         # 전체 손실 내 IDL+RTM 가중치
  idl_rtm_warmup_users: 5     # warmup 기간 (사용자 수)
  idl_n_quantiles: 5          # Detection threshold quantile 후보 수
  idl_rank_temperature: 0.5   # soft rank 스케일링 (수치 안정성)
  idl_rtm_temperature: 0.1    # RTM softmax temperature
  idl_det_steepness: 10.0     # Detection sigmoid steepness
  idl_min_gallery_classes: 2  # 최소 gallery 클래스 수
  idl_gallery_fraction: 0.7   # gallery로 사용할 클래스 비율

# Open-set recognition settings
Openset:
  enabled: true

  threshold_mode: 'far'
  target_far: 0.01            # FAR target 1% (0.001→0.01: τ 과도하게 높아지는 문제 완화)
  threshold_alpha: 0.2       # EMA smoothing coefficient (0.8→0.2: τ 급변 방지)
  threshold_max_delta: 0.05  # Maximum change limit (1.0→0.05: τ 급변 방지)

  # Initial values and warmup
  warmup_users: 1           # Warmup period
  initial_tau: 0.3           # Initial threshold

  # Data split
  dev_ratio: 0.1             # Dev set ratio (0.4→0.1: 학습 데이터 더 확보)

  # Logging
  verbose_calibration: true  # Verbose output

  # TTA settings (Test-Time Augmentation)
  tta_n_views: 1  # 1=disabled, 2-3 recommended
  tta_include_original: true  # Include original recommended
  tta_agree_k: 0  # 0=auto majority, 2=2+ agreement
  tta_augmentation_strength: 0.5  # 0.3-0.7 recommended (1.0→0.5: TTA 왜곡 과도 방지)
  tta_aggregation: 'mean'  # 'median' or 'mean'

  # Type-specific TTA repeat settings
  tta_n_repeats_genuine: 3      # Genuine scores: 3 repeats (accuracy important)
  tta_n_repeats_between: 3      # Between impostor: 3 repeats (balanced)
  tta_repeat_aggregation: 'mean'  # Inter-repeat aggregation method
  tta_verbose: true  # TTA debugging output

